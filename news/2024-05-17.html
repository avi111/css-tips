<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tips - Anchor Positioning</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-glow: #3b82f6;
            --text-main: #f8fafc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--primary-glow);
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }
        .anchor-nav {
            position: relative;
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--surface-color);
            border-radius: 0.75rem;
            width: max-content;
        }
        .anchor-link {
            padding: 0.5rem 1rem;
            text-decoration: none;
            color: var(--text-main);
            z-index: 1;
            anchor-name: --nav-item;
        }
        .anchor-link:hover {
            anchor-name: --active-nav;
        }
        .glow-indicator {
            position: absolute;
            position-anchor: --active-nav;
            top: anchor(top);
            bottom: anchor(bottom);
            left: anchor(left);
            right: anchor(right);
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 0.5rem;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            opacity: 0;
        }
        .anchor-nav:hover .glow-indicator {
            opacity: 1;
        }
        .no-anchor-warning {
            display: none;
            color: #f87171;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        @supports not (position-anchor: --active-nav) {
            .glow-indicator {
                display: none;
            }
            .no-anchor-warning {
                display: block !important;
            }
        }
    </style>
</head>
<body>
    <section>
        <h2 class="section-title">מיקום עוגן (Anchor Positioning) - רחפו מעל</h2>
        <nav class="anchor-nav">
            <a href="#" class="anchor-link">בית</a>
            <a href="#" class="anchor-link">אודות</a>
            <a href="#" class="anchor-link">פרויקטים</a>
            <a href="#" class="anchor-link">צור קשר</a>
            <div class="glow-indicator"></div>
        </nav>
        <p class="no-anchor-warning">⚠️ הדפדפן שלך אינו תומך ב-CSS Anchor Positioning.</p>
    </section>
</body>
</html>

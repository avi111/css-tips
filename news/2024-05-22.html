<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tips - Container Queries</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-glow: #10b981;
            --text-main: #f8fafc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--primary-glow);
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }
        .card-container {
            container-type: inline-size;
            container-name: card;
            resize: horizontal;
            overflow: hidden;
            border: 1px dashed #475569;
            padding: 1rem;
            width: 100%;
            max-width: 600px;
        }
        .responsive-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--surface-color);
            padding: 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }
        @container card (min-width: 400px) {
            .responsive-card {
                flex-direction: row;
                align-items: center;
                background: #334155;
            }
        }
    </style>
</head>
<body>
    <section>
        <h2 class="section-title">Container Queries (שאילתות מיכל)</h2>
        <p style="margin-bottom: 1rem;">
            סוף סוף אנחנו יכולים לעצב רכיבים לפי הגודל <strong>שלהם</strong> ולא לפי גודל המסך!
            גררו את הפינה הימנית של המסגרת למטה כדי לראות איך הכרטיס משנה את הפריסה שלו כשהוא מתרחב.
        </p>
        <div class="card-container">
            <div class="responsive-card">
                <div style="width: 50px; height: 50px; background: #10b981; border-radius: 50%;"></div>
                <div>
                    <strong>כרטיס חכם</strong>
                    <p>אני משנה את העיצוב שלי בהתאם לרוחב המיכל שלי.</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>

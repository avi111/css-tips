<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tips - Overscroll Behavior</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-glow: #3b82f6;
            --text-main: #f8fafc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--primary-glow);
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }
        .sidebar-scroll {
            overscroll-behavior: contain;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #334155;
            padding: 1rem;
            border-radius: 0.5rem;
            width: 250px;
        }
    </style>
</head>
<body>
    <section>
        <h2 class="section-title">התנהגות גלילת יתר (Overscroll Behavior)</h2>
        <div class="sidebar-scroll">
            <p>גלול למטה עד הסוף...</p>
            <div style="height: 400px; background: linear-gradient(to bottom, transparent, #3b82f6); margin: 1rem 0;"></div>
            <p>כאשר תגיע לנקודה זו, הגלילה לא תעבור לגוף העמוד!</p>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tips - Scroll-Driven Animations</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-glow: #10b981;
            --text-main: #f8fafc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--primary-glow);
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }
        .scroll-watcher {
            height: 10px;
            background: var(--primary-glow);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            scale: 0 1;
            transform-origin: left;
            animation: scroll-progress auto linear;
            animation-timeline: scroll();
            z-index: 1000;
        }
        @keyframes scroll-progress {
            to { scale: 1 1; }
        }
    </style>
</head>
<body>
    <div class="scroll-watcher"></div>
    <section>
        <h2 class="section-title">Scroll-Driven Animations</h2>
        <p style="margin-bottom: 1rem;">
            תסתכלו למעלה! יש פס התקדמות ירוק בראש העמוד שמתמלא ככל שאתם גוללים למטה.
            כל זה נעשה ב-CSS בלבד, ללא שורת JavaScript אחת!
        </p>
        <div style="height: 200px; overflow-y: auto; border: 1px solid #334155; padding: 1rem;">
            <p>גללו את העמוד הראשי (לא את התיבה הזו) כדי לראות את האפקט בראש המסך.</p>
        </div>
        <!-- ספייסר כדי לאפשר גלילה אמיתית בדף -->
        <div style="height: 1500px;"></div>
    </section>
</body>
</html>
